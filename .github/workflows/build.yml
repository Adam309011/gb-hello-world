name: Build Game Boy ROM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GBDK
        run: |
          wget https://github.com/gbdk-2020/gbdk-2020/releases/download/4.2.1/gbdk-linux64.tar.gz
          tar -xzf gbdk-linux64.tar.gz
          echo "$(pwd)/gbdk/bin" >> $GITHUB_PATH
      - name: Compile ROM
        run: make
      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: gameboy-rom
          path: "*.gb"