name: Build Game Boy ROM (RPG)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and install GBDK
        run: |
          # Download latest GBDK
          wget https://github.com/gbdk-2020/gbdk-2020/releases/latest/download/gbdk-linux64.tar.gz
          tar -xzf gbdk-linux64.tar.gz
          # Set environment variables
          echo "GBDKROOT=$(pwd)/gbdk" >> $GITHUB_ENV
          echo "$(pwd)/gbdk/bin" >> $GITHUB_PATH
          # Create /opt/gbdk structure and symlink everything
          sudo mkdir -p /opt/gbdk/bin /opt/gbdk/lib
          for file in $(pwd)/gbdk/bin/*; do
            sudo ln -sf $file /opt/gbdk/bin/
          done
          sudo ln -sf $(pwd)/gbdk/lib /opt/gbdk/lib
          # Also symlink the include directory (not strictly needed but safe)
          sudo ln -sf $(pwd)/gbdk/include /opt/gbdk/include
          # Verify sdcc and sdldgb are accessible
          ls -la /opt/gbdk/bin/sdcc /opt/gbdk/bin/sdldgb

      - name: Create Makefile
        run: |
          cat > Makefile << 'EOF'
          CC = lcc
          CFLAGS = -Wa-l -Wl-m -Wl-j -I$(GBDKROOT)/include -L$(GBDKROOT)/lib
          all: game.gb
          game.gb: huge_rpg.c
          	$(CC) $(CFLAGS) -o $@ $<
          clean:
          	rm -f game.gb *.o *.lst *.map
          EOF

      - name: Compile ROM
        run: |
          # Show that huge_rpg.c exists
          ls -la huge_rpg.c
          make

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: gameboy-rpg-rom
          path: "*.gb"