name: Build Game Boy ROM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with GBDK Docker
        run: |
          docker run --rm -v $(pwd):/src ghcr.io/gbdk-2020/gbdk:latest bash -c "cd /src && lcc -Wa-l -Wl-m -Wl-j -o game.gb huge_rpg.c"
      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: gameboy-rom
          path: "*.gb"